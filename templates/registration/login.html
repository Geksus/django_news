{% extends 'base.html' %}
{% load crispy_forms_filters %}

{% block title %}Log in{% endblock title %}

{% block content %}
    <h3>Log in</h3>
    <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <div class="d-flex flex-column px-0 w-auto">
            <a href="{% url 'password_reset' %}">Forgot your password?</a>
        <button class="btn btn-success w-25 mt-1" type="submit">Login</button>
        </div>
    </form>
{% endblock content %}
